name: GPU Price Tracker

on:
  schedule:
    # Runs every 7 days at 00:00 UTC on Monday
    - cron: "0 0 * * 1"
  workflow_dispatch:  # Also allows manual trigger from GitHub UI

permissions:
  contents: write  # Needed to commit updated data/ and docs/ files back to repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Initialize scraper run
        run: python scraper.py --init > scraper_log.txt 2>&1

      - name: Scrape Neysa
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scraper.py --site neysa >> scraper_log.txt 2>&1

      - name: Scrape Verda
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scraper.py --site verda >> scraper_log.txt 2>&1

      - name: Scrape RunPod
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scraper.py --site runpod >> scraper_log.txt 2>&1

      - name: Scrape Together AI
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scraper.py --site together >> scraper_log.txt 2>&1

      - name: Scrape Nebius
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scraper.py --site nebius >> scraper_log.txt 2>&1

      - name: Scrape Lambda Labs
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scraper.py --site lambda >> scraper_log.txt 2>&1

      - name: Scrape Spheron
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scraper.py --site spheron >> scraper_log.txt 2>&1

      - name: Scrape E2E Networks
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scraper.py --site e2e >> scraper_log.txt 2>&1

      - name: Save and Finalize
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scraper.py --finalize >> scraper_log.txt 2>&1

      - name: Regenerate dashboard
        run: python build_dashboard.py

      - name: Commit and push updated data + logs + dashboard
        if: always()
        run: |
          git config user.name  "gpu-tracker-bot"
          git config user.email "bot@gpu-tracker"
          git add data/ docs/ index.html scraper_log.txt || true
          git diff --cached --quiet || git commit -m "chore: update data/logs $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
